<div class="hint-box mb-2 last:mb-0">
    <span class="font-medium text-amber-700">Hint {{ hint_number }}:</span>
    <span class="text-amber-800">{{ hint }}</span>
</div>
{% if has_more %}
<form method="post" action="{% url 'equations:hint' subject_slug=session.subject.slug pk=session.pk %}" class="mt-2">
    {% csrf_token %}
    <button type="submit" class="text-sm text-amber-600 hover:text-amber-800 underline">
        Show another hint
    </button>
</form>
{% endif %}
